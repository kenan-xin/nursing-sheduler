name: Test Web Frontend macOS

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  test-web-frontend-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: web-frontend
        run: bun install
      - name: Run tests
        working-directory: web-frontend
        run: bun run test
      - name: Run tests with coverage
        working-directory: web-frontend
        run: bun run test:coverage
      - name: Upload frontend coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./web-frontend/coverage/lcov.info
          flags: web-frontend-macos
          name: web-frontend-vitest-macos

  test-web-frontend-e2e-macos:
    runs-on: macos-latest
    needs: test-web-frontend-macos

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: web-frontend
        run: bun install
      - name: Install Playwright Chromium
        working-directory: web-frontend
        run: bunx playwright install chromium
      - name: Run Playwright tests with coverage
        working-directory: web-frontend
        run: |
          rm -rf .e2e-coverage coverage-e2e
          E2E_COVERAGE=1 bunx playwright test --workers=4
      - name: Generate Playwright coverage report
        working-directory: web-frontend
        run: bun run coverage:e2e:report
      - name: Upload Playwright coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./web-frontend/coverage-e2e/lcov.info
          flags: web-frontend-e2e-macos
          name: web-frontend-playwright-macos
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-macos
          path: |
            web-frontend/playwright-report
            web-frontend/test-results
          if-no-files-found: ignore
