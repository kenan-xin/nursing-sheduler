# pnpm build-script policy. pnpm 11 replaced onlyBuiltDependencies /
# ignoredBuiltDependencies with the `allowBuilds` map (see pnpm.io/settings).
# `false` = do NOT run the package's install scripts and do NOT error:
#   sharp    — ships prebuilt binaries via platform packages; no build step needed.
#   lefthook — git-hook installer; binary ships via platform packages and the
#              image has no hooks to install.
allowBuilds:
  sharp: false
  lefthook: false

# pnpm 11 reads `overrides` from this file, not from `package.json`'s `pnpm`
# field (that field is silently ignored — see the warning emitted on every
# install). ExcelJS 4.4.0 (Oct 2023, the project's latest) pulls uuid@8.3.2,
# which carries GHSA-w5hq-g745-h8pq / CVE-2026-41907: a missing bounds check in
# the buffer-accepting v3/v5/v6 variants. ExcelJS uses uuid v4 only (random,
# buffer-free, not vulnerable — see `exceljs/lib/xlsx/xform/sheet/cf-ext/
# cf-rule-ext-xform.js`). The override pins the whole transitive uuid to the
# exact reviewed fixed release uuid@11.1.1 so the ExcelJS UUID advisory no
# longer appears in `pnpm audit --prod` (uuid 11's CJS entry still exports the
# `v4` ExcelJS requires — `dist/cjs/index.js` re-exports `v4` — and the full
# Web/test/build/lint suite below verifies nothing else regresses). The overall
# production audit is NOT claimed clean: one unrelated, pre-existing
# moderate Next → postcss advisory (GHSA-qx2v-qp2m-jg93) remains and is outside
# the T16c surface. The selector is an EXACT version (not a range), so the
# lockfile can never silently float to a future major uuid outside ExcelJS's
# declared `^8.3.2` compatibility surface.
overrides:
  uuid: "11.1.1"
