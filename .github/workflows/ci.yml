name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck · lint · format · unit · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # Installs the tools pinned in .mise.toml / .python-version at the repo root:
      # Python 3.12.13 (so validate_origin.py's 3.10+ guard passes — verify-deploy.test.ts
      # shells out to `python3`) and node 24.14.0. Single source of truth with local dev.
      - uses: jdx/mise-action@v2

      - name: Confirm pinned Python (validator guard needs 3.10+)
        run: python3 --version

      - name: Enable pnpm (pinned via package.json packageManager)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm exec oxfmt --check .

      # Includes verify-deploy.test.ts, which runs docker/validate_origin.py via the
      # pinned python3 — the guard passes because mise provides 3.12.13.
      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: checks
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      # playwright.config.ts webServer runs `pnpm build && pnpm start`.
      - name: Run e2e
        run: pnpm exec playwright test
