# Git hooks (lefthook). Toolchain lives in web/, so jobs use `root: web/` — lefthook
# filters staged files to that subtree, strips the prefix, and runs from web/.
# Only code files are matched (globs below); md / sql / json are intentionally
# never linted or format-checked on commit.
pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      root: "web/"
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      run: pnpm exec oxlint {staged_files}
    - name: oxfmt
      root: "web/"
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts,css}"
      run: pnpm exec oxfmt --check {staged_files}
