<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
  --font-display:"Figtree",system-ui,sans-serif;
  --font-ui:"Hanken Grotesk",system-ui,sans-serif;
  --font-mono:"Spline Sans Mono",ui-monospace,monospace;
  --ink:#14161b;--ink2:#4a515c;--ink3:#8b929c;--faint:#aab0ba;--on-ink:#fff;
  --bg:#fbfcfd;--surface:#fff;--panel:#f2f4f7;--panel-alt:#f1f3f6;
  --line:#c8cdd5;--line2:#e2e5ea;--rule:#14161b;
  --sidebar:#fff;--chrome:#14161b;
  --brand:#2360c4;--brandink:#2360c4;--brandtint:#eef4fc;--onbrand:#fff;
  --success:#1f9a5c;--successtint:#eafaf1;--warn:#b07d10;--warntint:#fbf3df;--error:#d94032;--errortint:#fbeae8;
  --sp:1;--dens:1;
  --space-1:calc(4px*var(--sp));--space-2:calc(8px*var(--sp));--space-3:calc(12px*var(--sp));--space-4:calc(16px*var(--sp));--space-5:calc(20px*var(--sp));--space-6:calc(24px*var(--sp));--space-8:calc(32px*var(--sp));--space-12:calc(48px*var(--sp));
  --ease:cubic-bezier(.4,0,.2,1);--dur-fast:.15s;--dur-base:.22s;
  --shadow-toast:0 8px 26px rgba(20,30,50,.16);--shadow-dialog:0 12px 34px rgba(20,30,50,.18);--shadow-side:-16px 0 40px rgba(20,30,50,.18);
  --base-h:26px;--base-b:15.5px;--base-l:12px;
  --fs-xl:calc(var(--base-h)*var(--dens));--fs-card:calc(var(--base-h)*.78*var(--dens));--fs-lg:calc(var(--base-h)*.60*var(--dens));--fs-md:calc(var(--base-b)*var(--dens));--fs-sm:calc(var(--base-b)*.92*var(--dens));
  --fs-lbl:calc(var(--base-l)*var(--dens));--fs-lblmd:calc(var(--base-l)*1.13*var(--dens));--fs-lbllg:calc(var(--base-l)*1.27*var(--dens));
  --t-display:var(--fs-xl);--t-h2:var(--fs-xl);--t-cardhead:var(--fs-card);--t-h3:var(--fs-lg);--t-title:var(--fs-lg);
  --t-body:var(--fs-md);--t-sm:var(--fs-sm);--t-xs:var(--fs-sm);
  --m-xs:var(--fs-lbl);--m-sm:var(--fs-lbl);--m-md:var(--fs-lblmd);--m-lg:var(--fs-lbllg);
  --sidebar-w:280px;
}
.ns-root[data-theme="dark"]{
  --ink:#eef1f4;--ink2:#9aa3b0;--ink3:#6b7585;--faint:#5c6675;--on-ink:#0f1319;
  --bg:#13171e;--surface:#181d25;--panel:#1d242e;--panel-alt:#1d242e;
  --line:#313a46;--line2:#262e38;--rule:#3a4454;--sidebar:#13171e;--chrome:#0f1319;
  --brand:#2360c4;--brandink:#7fb2f0;--brandtint:#1c2738;--onbrand:#fff;
  --success:#5fcf94;--successtint:#16271d;--warn:#d6a743;--warntint:#2a2310;--error:#e06a5e;--errortint:#2a1714;
}
@media(min-width:480px){:root{--base-h:27px;--base-b:15.5px;}}
@media(min-width:768px){:root{--base-h:29px;--base-b:16px;--base-l:12.5px;}}
@media(min-width:1024px){:root{--base-h:31px;--base-b:16.5px;--base-l:13px;}}
@media(min-width:1280px){:root{--base-h:32px;--base-b:17px;--base-l:13px;}}
@media(min-width:1440px){:root{--base-h:34px;--base-b:17px;--base-l:13.5px;}}
@media(min-width:1920px){:root{--base-h:38px;--base-b:18px;--base-l:14px;}}
*{box-sizing:border-box;}
.ns-root{font-family:var(--font-ui);color:var(--ink);background:var(--bg);min-height:100dvh;font-size:var(--t-body);line-height:1.5;-webkit-font-smoothing:antialiased;}
.ns-root *::-webkit-scrollbar{width:10px;height:10px;}
.ns-root *::-webkit-scrollbar-thumb{background:var(--line);border:2px solid var(--bg);}
.ns-root *::-webkit-scrollbar-track{background:transparent;}
:where(.ns-root input,.ns-root select,.ns-root textarea):focus-visible{outline:2px solid var(--brand);outline-offset:-1px;}
.ns-root button{font-family:inherit;cursor:pointer;}
.ns-root input,.ns-root select,.ns-root textarea{font-family:inherit;font-size:var(--t-body);color:var(--ink);}
@keyframes ns-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes ns-scrim{from{opacity:0;}to{opacity:1;}}
@keyframes ns-slide{from{transform:translateX(100%);}to{transform:none;}}
@keyframes ns-spin{to{transform:rotate(360deg);}}
@keyframes ns-shimmer{0%,100%{opacity:.45;}50%{opacity:.9;}}
@keyframes ns-toast{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}
.ns-shell{display:flex;min-height:100dvh;}
.ns-side{display:none;}
.ns-main{flex:1;min-width:0;}
.ns-hamb{display:inline-flex;}
@media(min-width:920px){
  .ns-side{display:flex;position:sticky;top:0;height:100dvh;}
  .ns-hamb{display:none;}
  .ns-drawer-scrim{display:none!important;}
}
.ns-fade{animation:ns-fade var(--dur-base) var(--ease);}
.dg-preview{display:block;}
.ns-hide-sm{display:none;}
@media(min-width:768px){.ns-hide-sm{display:table-cell;}}
.ns-grid2{display:grid;grid-template-columns:1fr;gap:var(--space-4);}
@media(min-width:900px){.ns-grid2{grid-template-columns:1fr 1fr;}}
.ns-grid3{display:grid;grid-template-columns:1fr;gap:var(--space-4);}
@media(min-width:640px){.ns-grid3{grid-template-columns:1fr 1fr;}}
@media(min-width:1100px){.ns-grid3{grid-template-columns:1fr 1fr 1fr;}}
.ns-wizgrid{display:grid;grid-template-columns:1fr;gap:var(--space-3);}
@media(min-width:760px){.ns-wizgrid{grid-template-columns:1fr 1fr;}}
@media(min-width:1200px){.ns-wizgrid{grid-template-columns:1fr 1fr 1fr;}}
/* transfer list (available / controls / members) — stacks on phones */
.ns-xfer{display:grid;grid-template-columns:1fr;gap:12px;align-items:stretch;}
.ns-xfer-mid{display:flex;flex-direction:row;justify-content:center;gap:8px;}
@media(min-width:620px){.ns-xfer{grid-template-columns:1fr auto 1fr;}.ns-xfer-mid{flex-direction:column;}}
/* two-column form / picker panes — single column on phones */
.ns-formgrid{display:grid;grid-template-columns:1fr;gap:20px 24px;align-items:start;}
@media(min-width:720px){.ns-formgrid{grid-template-columns:1fr 1fr;}}
.ns-panes2{display:grid;grid-template-columns:1fr;gap:12px;align-items:start;}
@media(min-width:600px){.ns-panes2{grid-template-columns:1fr 1fr;}}
/* responsive padding for wide form bodies */
.ns-formbody{padding:18px;}
@media(min-width:720px){.ns-formbody{padding:26px 28px;}}
@media(prefers-reduced-motion:reduce){.ns-root *{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</helmet>

<div class="ns-root" data-theme="{{ theme }}" style="{{ rootStyle }}">
<div class="ns-shell">

  <sc-if value="{{ navOpen }}" hint-placeholder-val="{{ false }}">
    <div class="ns-drawer-scrim" onClick="{{ closeNav }}" style="position:fixed;inset:0;background:rgba(8,10,14,.5);z-index:40;animation:ns-scrim var(--dur-fast) var(--ease);"></div>
  </sc-if>

  <aside class="ns-side" style="width:var(--sidebar-w);flex-direction:column;background:var(--sidebar);border-right:1px solid var(--line);z-index:50;">
    <dc-import name="SideNav" nav="{{ nav }}" mode="{{ mode }}" theme="{{ theme }}" set-mode="{{ setMode }}" toggle-theme="{{ toggleTheme }}" hint-size="100%,100%"></dc-import>
  </aside>

  <!-- mobile drawer -->
  <sc-if value="{{ navOpen }}" hint-placeholder-val="{{ false }}">
    <aside style="position:fixed;top:0;left:0;height:100dvh;width:250px;max-width:84vw;background:var(--sidebar);border-right:1px solid var(--line);z-index:50;display:flex;flex-direction:column;animation:ns-slide var(--dur-base) var(--ease);">
      <dc-import name="SideNav" nav="{{ nav }}" mode="{{ mode }}" theme="{{ theme }}" set-mode="{{ setMode }}" toggle-theme="{{ toggleTheme }}" hint-size="100%,100%"></dc-import>
    </aside>
  </sc-if>

  <main class="ns-main">
    <!-- top bar -->
    <header style="position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:var(--space-3);height:56px;padding:0 var(--space-5);background:var(--surface);border-bottom:1px solid var(--line);">
      <button class="ns-hamb" onClick="{{ openNav }}" aria-label="Open menu" style="width:40px;height:40px;align-items:center;justify-content:center;background:transparent;border:1px solid var(--line);color:var(--ink);font-size:16px;">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div style="display:flex;align-items:center;gap:10px;min-width:0;">
        <div style="width:26px;height:26px;background:var(--chrome);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none;"><i class="fa-solid fa-diagram-project"></i></div>
        <div style="font:600 var(--m-sm) var(--font-ui);letter-spacing:.03em;color:var(--ink2);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ crumb }}</div>
      </div>
      <div style="flex:1;"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font:600 var(--m-xs) var(--font-ui);letter-spacing:.03em;color:var(--ink3);text-transform:uppercase;" class="ns-hide-sm">WARD 7B · GENERAL MEDICINE</span>
        <button onClick="{{ toggleTheme }}" aria-label="Toggle theme" style="width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--line);color:var(--ink);"><i class="{{ themeIcon }}"></i></button>
      </div>
    </header>

    <div style="padding:var(--space-6) var(--space-5) 72px;">
    <div style="max-width:1240px;margin:0 auto;">

      <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
        <dc-import name="ScreenHome" vals="{{ homeVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isDates }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenDates" vals="{{ datesVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isStaff }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenStaff" vals="{{ staffVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isShifts }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenShifts" vals="{{ shiftsVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isRules }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenRules" vals="{{ rulesVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isRequests }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenRequests" vals="{{ requestsVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isGenerate }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenGenerate" vals="{{ generateVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isSchedule }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenSchedule" vals="{{ scheduleVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isAppendix }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenAppendixAI" vals="{{ appendixVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isRequirements }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenCards" kind="requirements" editor="{{ cardEditor }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isSuccessions }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenCards" kind="successions" editor="{{ cardEditor }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isCounts }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenCards" kind="counts" editor="{{ cardEditor }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isAffinities }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenCards" kind="affinities" editor="{{ cardEditor }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isCoverings }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenCards" kind="coverings" editor="{{ cardEditor }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isExport }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenExport" vals="{{ exportVals }}" hint-size="100%,600px"></dc-import>
      </sc-if>
      <sc-if value="{{ isSaveload }}" hint-placeholder-val="{{ false }}">
        <dc-import name="ScreenSaveLoad" go="{{ setScreen }}" on-new="{{ newSchedule }}" hint-size="100%,600px"></dc-import>
      </sc-if>

    </div>
    </div>
  </main>

  <sc-if value="{{ toastShown }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ dismissToast }}" role="status" style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:80;display:flex;align-items:center;gap:11px;background:var(--ink);color:var(--on-ink);border-left:3px solid var(--success);padding:13px 18px 13px 15px;box-shadow:var(--shadow-side);animation:ns-toast var(--dur-base) var(--ease);cursor:pointer;max-width:92vw;">
      <span style="font-family:var(--font-ui);font-weight:800;font-size:15px;line-height:1;color:var(--on-ink);flex:none;">✓</span>
      <span style="font:600 var(--t-sm) var(--font-ui);">{{ toast }}</span>
    </div>
  </sc-if>

  <sc-if value="{{ confirmShown }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ cancelConfirm }}" style="position:fixed;inset:0;background:rgba(8,10,14,.5);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;animation:ns-scrim var(--dur-fast) var(--ease);">
      <div onClick="{{ stopProp }}" style="background:var(--surface);border:1px solid var(--line);max-width:460px;width:100%;box-shadow:var(--shadow-dialog);">
        <div style="padding:18px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px;">
          <div style="width:34px;height:34px;background:var(--errortint);color:var(--error);display:flex;align-items:center;justify-content:center;flex:none;"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div style="font:800 var(--t-cardhead) var(--font-display);letter-spacing:-.01em;">{{ confirmTitle }}</div>
        </div>
        <div style="padding:18px 20px;">
          <sc-if value="{{ confirmHasLines }}" hint-placeholder-val="{{ true }}">
            <div style="font-size:var(--t-sm);color:var(--ink2);margin-bottom:11px;">This is used elsewhere. Deleting it will also update:</div>
            <ul style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:6px;">
              <sc-for list="{{ confirmLines }}" as="ln" hint-placeholder-count="2"><li style="font-size:var(--t-sm);color:var(--ink);">{{ ln }}</li></sc-for>
            </ul>
          </sc-if>
          <sc-if value="{{ confirmNoLines }}" hint-placeholder-val="{{ false }}">
            <div style="font-size:var(--t-sm);color:var(--ink2);">This isn’t referenced by any rule. It will simply be removed.</div>
          </sc-if>
        </div>
        <div style="padding:14px 20px;border-top:1px solid var(--line2);display:flex;justify-content:flex-end;gap:10px;">
          <button onClick="{{ cancelConfirm }}" style="height:40px;padding:0 16px;background:transparent;border:1px solid var(--line);font:600 var(--t-body) var(--font-ui);" style-hover="background:var(--panel)">Cancel</button>
          <button onClick="{{ confirmDeleteNow }}" style="height:40px;padding:0 18px;background:var(--error);color:#fff;border:none;font:700 var(--t-body) var(--font-ui);display:inline-flex;align-items:center;gap:8px;" style-hover="filter:brightness(.94)"><i class="fa-solid fa-trash" style="font-size:12px;"></i> Delete &amp; update rules</button>
        </div>
      </div>
    </div>
  </sc-if>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Spacious&quot;,&quot;Comfortable&quot;,&quot;Compact&quot;],&quot;default&quot;:&quot;Comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Feel&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[&quot;#2360c4&quot;,&quot;#0e7490&quot;,&quot;#b0357a&quot;,&quot;#3f4a63&quot;],&quot;default&quot;:&quot;#2360c4&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Feel&quot;},&quot;appearance&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Light&quot;,&quot;Dark&quot;],&quot;default&quot;:&quot;Light&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Feel&quot;}}">
class Component extends DCLogic {
  state = {
    theme:'light', mode:'guided', navOpen:false,
    screen:'home', wizardStep:1,
    staff:null, editStaff:null, staffDraft:null,
    staffGroups:null, editGroup:null, groupDraft:null,
    shifts:null, editShift:null, shiftDraft:null,
    shiftGroups:null, editSGroup:null, sgroupDraft:null,
    exportSecs:null, editExport:null, exportDraft:'',
    reqData:null, reqKind:'leave', reqShift:'AM',
    rangeStart:'2026-02-01', rangeEnd:'2026-02-28', calMonth:'2026-02', importHolidays:true,
    dateGroups:null, editDGroup:null, dgroupDraft:null,
    rules:null, // seeded in constructor
    rulesAdmin:false, guidedShortcuts:[],
    // optimize
    runState:'idle', progress:0, // idle|running|infeasible|feasible
    // llm
    aiOpen:false, chat:null, aiThinking:false, appliedFixes:[],
    llmProvider:'anthropic', llmModel:'claude-sonnet-4-5', llmKey:'', llmTested:false,
    // schedule / manual adjust
    schedule:null, selectedCell:null, undoStack:[], scheduleView:'grid', scheduleLoading:false,
    toast:null, confirmDelete:null,
  };
  constructor(props){
    super(props);
    if(props && props.appearance==='Dark') this.state.theme='dark';
    this.state.rules = this.RULES.map(r=>({...r}));
    this.state.chat = [
      {who:'ai', text:"I looked at your ward. The roster can't be built yet because Chinese New Year weekend (Sat 14 – Sun 15 Feb) needs 3 night nurses, but only 2 are available once approved leave and the \u201cnight \u2192 rest\u201d rule are applied. Here are three ways to make it work \u2014 apply any, or ask me anything."},
    ];
    this._cardUid=1; this._shortcutSeq=1;
    // F2 — SERIALIZATION BOUNDARY (decide at implementation): several fields on entities/cards
    // below are UI-only and must be stripped/resolved before the scenario YAML is generated for
    // Save/Copy/download or POST /optimize:
    //   • `_k` (staff/groups/shifts) and `uid` (cards) — client React keys, never serialize.
    //   • card `disabled` — a guided-Rules on/off toggle with no backend field. Decide: does a
    //     disabled rule get OMITTED from the payload, or is the toggle a pure UI convenience?
    //   • card `unit` / `tag` / `applied` — UI markers (see the contract SERIALIZATION note in
    //     ScreenCards.saveContract). `tag:'contracted_hours'` → backend `hoursContract`.
    //   • `guidedShortcuts` — a UI projection layer over real records; not a backend concept.
    this.state.cardsByKind = {};
    ['requirements','successions','counts','affinities','coverings'].forEach(k=>{
      this.state.cardsByKind[k] = (this.CARD_DATA[k].cards||[]).map(c=>({uid:'cu'+(this._cardUid++), desc:c.desc, weight:c.weight, applied:c.applied, coef:c.coef, unit:c.unit, tag:c.tag, disabled:c.disabled, fields:c.fields.map(f=>({...f}))}));
    });
    this.state.staff=this.PEOPLE.map((p,i)=>({...p,_k:'p'+i})); this._staffSeq=this.PEOPLE.length;
    // seed import-created editable date groups (WORKDAY/NON-WORKDAY/PH) with date-key membership across the whole range
    (()=>{
      const rd=this.rangeDates();
      const work=rd.filter(x=>!x.weekend && !x.holiday).map(x=>x.key);
      const nonwork=rd.filter(x=>x.weekend || x.holiday).map(x=>x.key);
      const ph=rd.filter(x=>x.holiday).map(x=>x.key);
      this.state.dateGroups=[{_k:'dg0',id:'WORKDAY',members:work},{_k:'dg1',id:'NON-WORKDAY',members:nonwork},{_k:'dg2',id:'PH',members:ph}];
      this._dgroupSeq=3;
    })();
    this.state.staffGroups=this.PEOPLE_GROUPS.map((g,i)=>({_k:'g'+i, id:g.id, members:[...g.members]})); this._groupSeq=this.PEOPLE_GROUPS.length;
    this.state.shifts=this.SHIFTTYPES.map((sh,i)=>({...sh,_k:'sh'+i})); this._shiftSeq=this.SHIFTTYPES.length;
    this.state.shiftGroups=this.SHIFT_GROUPS.map((g,i)=>({_k:'sg'+i, id:g.id, members:[...g.members]})); this._sgroupSeq=this.SHIFT_GROUPS.length;
    this.state.reqData=JSON.parse(JSON.stringify(this.REQUESTS));
    this.state.exportSecs=this.EXPORT_SECS.map((sec,si)=>({...sec, rows:sec.rows.map((r,ri)=>({...r,_k:'ex'+si+'_'+ri}))})); this._exSeq=1000;
    this.state.schedule=this._buildRoster(this.state);
  }
  cardAdd = (kind,card)=> this.setState(s=>({cardsByKind:{...s.cardsByKind,[kind]:[...s.cardsByKind[kind], {...card, uid:card.uid||('cu'+(this._cardUid++))}]}}));

  // Live roster generation from editable state (staff, worked shift types + their requirement needs,
  // the date range, and leave/off requests). Greedy but plausible: honors leave pins, avoids a shift
  // after a night, keeps preceptees on day shifts / weekdays, and rotates for a fair spread.
  rosterDays(){
    const L=['Su','Mo','Tu','We','Th','Fr','Sa'];
    return this.rangeDates().map(x=>{ const dow=new Date(x.key+'T00:00:00Z').getUTCDay(); return {d:x.d, key:x.key, weekend:x.weekend, holiday:!!x.holiday, dow, label:L[dow]}; });
  }
  _buildRoster(state){
    const people=(state.staff||[]).map(p=>({id:p.id, role:p.role}));
    const days=this.rosterDays();
    const worked=(state.shifts||[]).filter(sh=>!sh.auto);
    const reqs=(state.cardsByKind&&state.cardsByKind.requirements)||[];
    const needs={}; worked.forEach(sh=>{ const n=this._shiftNeed(reqs,sh.id); needs[sh.id]=(n!=null?n:(sh.need!=null?sh.need:0)); });
    const dayShiftId=(worked.find(s=>s.id==='AM')||worked[0]||{}).id;
    const nightId=(worked.find(s=>s.id==='N'||/night/i.test(s.name||''))||{}).id;
    const reqData=state.reqData||{};
    const order=people.map(p=>p.id);
    const sched={}; people.forEach(p=>{ sched[p.id]=days.map(()=>'OFF'); });
    days.forEach((day,di)=>{
      const assigned=new Set();
      people.forEach(p=>{ const r=(reqData[p.id]||{})[di+1]; if(r&&r.kind==='leave'){ sched[p.id][di]='LV'; assigned.add(p.id); } });
      worked.forEach((sh,si)=>{
        const need=needs[sh.id]||0; let filled=0;
        const rot=order.length?((di*2+si)%order.length):0;
        for(let k=0;k<order.length && filled<need;k++){
          const pid=order[(rot+k)%order.length];
          if(assigned.has(pid)) continue;
          const person=people.find(p=>p.id===pid);
          if(person.role==='Preceptee' && sh.id!==dayShiftId) continue;
          if(person.role==='Preceptee' && day.weekend) continue;
          if(nightId && (sh.id==='AM'||sh.id==='PM') && di>0 && sched[pid][di-1]===nightId) continue;
          const r=(reqData[pid]||{})[di+1]; if(r&&r.kind==='off') continue;
          sched[pid][di]=sh.id; assigned.add(pid); filled++;
        }
      });
    });
    return sched;
  }
  buildSchedule(){
    // 12-slot rotation guarantees AM4 / PM3 / N3 / OFF2 each day, and never N->AM/PM.
    const P=['AM','AM','AM','AM','PM','PM','PM','N','N','N','OFF','OFF'];
    const sched={};
    this.PEOPLE.forEach((p,pi)=>{
      sched[p.id]=this.DAYS.map((day,di)=>{
        let s=P[(pi+di)%12];
        if(p.role==='Preceptee'){ s=(day.weekend? 'OFF' : (s==='OFF'?'OFF':'AM')); } // students: weekday days only
        return s;
      });
    });
    // Inject pinned paid leave (LEAVE): intended leave is always honored (INV3). Coverage is
    // backfilled from a resting nurse so the ward stays staffed (INV2) and the demo roster stays clean.
    Object.entries(this.REQUESTS).forEach(([person,pr])=>{
      Object.entries(pr).forEach(([dn,r])=>{
        if(!r || r.kind!=='leave') return;
        const di=Number(dn)-1; const arr=sched[person]; if(!arr||di<0||di>=arr.length) return;
        const prev=arr[di];
        if(prev!=='OFF' && prev!=='LV'){
          const bf=this.PEOPLE.find(q=> q.id!==person && sched[q.id] && sched[q.id][di]==='OFF'
            && (q.role!=='Preceptee' || prev==='AM')
            && !(prev==='N' && di+1<arr.length && (sched[q.id][di+1]==='AM'||sched[q.id][di+1]==='PM')));
          if(!bf) return; // can't preserve coverage — leave this pin off the demo roster
          sched[bf.id][di]=prev;
        }
        arr[di]='LV';
      });
    });
    return sched;
  }

  // ---- shift handlers ----
  // Clock time (start–end) is the on-the-floor span shown on the roster ONLY. It is NOT the paid
  // length: unpaid breaks make the span longer than working hours, so durationMinutes (the value
  // that auto-fills contracted-hours coefficients) is entered explicitly, never derived from here.
  // _durFromRange stays only to show the clock-span hint. Overnight (end ≤ start) rolls +24h.
  _parseRange(str){const m=String(str||'').match(/(\d{1,2}:\d{2})\s*[–-]\s*(\d{1,2}:\d{2})/);if(!m)return{start:'',end:''};const pad=t=>{const[h,mm]=t.split(':');return String(h).padStart(2,'0')+':'+mm;};return{start:pad(m[1]),end:pad(m[2])};}
  _durFromRange(start,end){const ok=t=>/^\d{1,2}:\d{2}$/.test(t||'');if(!ok(start)||!ok(end))return null;const tm=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};let d=tm(end)-tm(start);if(d<=0)d+=1440;return d;}
  // ---- shift-type requirement binding ----
  // A shift type's "minimum nurses" is NOT a separate field: it is the Required value of that
  // shift's BASELINE staffing requirement (a requirement card scoped to this one shift type over
  // ALL dates). cardsByKind.requirements is the single source of truth; the Shifts card and the
  // advanced Staffing requirements editor are two views of the same object.
  _reqFieldVal(card,key){ const f=(card.fields||[]).find(x=>x.k===key); return f?f.v:''; }
  _reqShiftTypes(card){ return this._reqFieldVal(card,'Shift type').split(',').map(x=>x.trim()).filter(Boolean); }
  _isAllDates(v){ const n=String(v||'').trim().toUpperCase(); return n===''||n==='ALL'||n==='(ALL)'; }
  _baselineReqIdx(reqs, shiftId){
    let idx=-1;
    (reqs||[]).forEach((c,i)=>{ if(idx>=0) return; const st=this._reqShiftTypes(c);
      if(st.length===1 && st[0]===shiftId && this._isAllDates(this._reqFieldVal(c,'Dates'))) idx=i; });
    return idx;
  }
  _shiftNeed(reqs, shiftId){ const i=this._baselineReqIdx(reqs,shiftId); if(i<0) return null; const n=Number(this._reqFieldVal(reqs[i],'Required')); return Number.isNaN(n)?null:n; }
  _baselineReqPreferred(reqs, shiftId){ const i=this._baselineReqIdx(reqs,shiftId); if(i<0) return null; const raw=this._reqFieldVal(reqs[i],'Preferred'); if(raw===''||raw==null) return null; const n=Number(raw); return Number.isNaN(n)?null:n; }
  _extraReqCount(reqs, shiftId){ const base=this._baselineReqIdx(reqs,shiftId); let n=0; (reqs||[]).forEach((c,i)=>{ if(i===base) return; if(this._reqShiftTypes(c).includes(shiftId)) n++; }); return n; }
  _baselineReqQualified(reqs, shiftId){ const i=this._baselineReqIdx(reqs,shiftId); return i<0?'ALL':(this._reqFieldVal(reqs[i],'Qualified')||'ALL'); }
  _writeBaselineReq(reqs, shiftId, need, preferred){
    // `preferred` optional: undefined = leave Preferred untouched; '' or null = clear; else set.
    const setPref = preferred!==undefined;
    const prefStr = (preferred===''||preferred==null)?'':String(preferred);
    const idx=this._baselineReqIdx(reqs, shiftId);
    if(idx>=0) return reqs.map((c,i)=> i===idx ? {...c, fields:c.fields.map(f=>{
      if(f.k==='Required') return {...f,v:(Number.isNaN(need)?f.v:String(need))};
      if(f.k==='Preferred' && setPref) return {...f,v:prefStr};
      return f;
    })} : c);
    const card={desc:shiftId+' cover', weight:null, fields:[{k:'Shift type',v:shiftId},{k:'Required',v:(Number.isNaN(need)?'0':String(need))},{k:'Preferred',v:(setPref?prefStr:'')},{k:'Qualified',v:'ALL'},{k:'Dates',v:'ALL'}]};
    return [...reqs, card];
  }
  // ---- referential integrity for shift-type codes ----
  // A shift code (AM, N…) is the stable identifier every store references by string. These helpers
  // scan every reference, and cascade a delete (remove/strip) or a rename (rewrite in place) so the
  // code can be changed or removed without leaving dangling references anywhere.
  _splitList(v){ return String(v||'').split(',').map(x=>x.trim()).filter(Boolean); }
  _patternTokens(v){ return String(v||'').split(/[^A-Za-z0-9_]+/).map(x=>x.trim()).filter(Boolean); }
  _shiftRefs(s, id){
    const cb=s.cardsByKind||{};
    const inList=(card,key)=>this._splitList(this._reqFieldVal(card,key)).includes(id);
    const filt=(kind,key)=>(cb[kind]||[]).map((c,i)=>({c,i})).filter(({c})=>inList(c,key)||(c.coef&&(id in c.coef)));
    const requirements=filt('requirements','Shift type');
    const counts=filt('counts','Count shift types');
    const affinities=(cb.affinities||[]).map((c,i)=>({c,i})).filter(({c})=>inList(c,'Shift types'));
    const coverings=(cb.coverings||[]).map((c,i)=>({c,i})).filter(({c})=>inList(c,'Shift types'));
    const successions=(cb.successions||[]).map((c,i)=>({c,i})).filter(({c})=>this._patternTokens(this._reqFieldVal(c,'Pattern')).includes(id));
    const groups=(s.shiftGroups||[]).filter(g=>(g.members||[]).includes(id));
    let scheduleCount=0; Object.values(s.schedule||{}).forEach(arr=>(arr||[]).forEach(v=>{if(v===id)scheduleCount++;}));
    let requests=0; Object.values(s.reqData||{}).forEach(pr=>Object.values(pr||{}).forEach(r=>{if(r&&r.shift===id)requests++;}));
    return {requirements,counts,affinities,coverings,successions,groups,scheduleCount,requests};
  }
  _shiftImpactLines(refs){
    const L=[]; const plur=(n,w)=>n+' '+w+(n>1?'s':'');
    if(refs.requirements.length) L.push(plur(refs.requirements.length,'staffing requirement')+' (references removed; empty ones deleted)');
    if(refs.successions.length) L.push(plur(refs.successions.length,'shift succession')+' (deleted \u2014 pattern no longer valid)');
    if(refs.counts.length) L.push(plur(refs.counts.length,'shift count')+' (references removed)');
    if(refs.affinities.length) L.push(plur(refs.affinities.length,'affinity rule'));
    if(refs.coverings.length) L.push(plur(refs.coverings.length,'shift type covering'));
    if(refs.groups.length) L.push(plur(refs.groups.length,'shift group')+' ('+refs.groups.map(g=>g.id).join(', ')+')');
    if(refs.requests) L.push(plur(refs.requests,'shift request')+' on the Requests screen');
    if(refs.scheduleCount) L.push(plur(refs.scheduleCount,'assigned cell')+' on the built roster (reset to Off)');
    return L;
  }
  _removeShiftFromCards(cb, id){
    const strip=(card,key)=>{const arr=this._splitList(this._reqFieldVal(card,key)).filter(x=>x!==id);return {...card, fields:card.fields.map(f=>f.k===key?{...f,v:arr.join(', ')}:f)};};
    const dropCoef=(card)=>{ if(!card.coef||!(id in card.coef)) return card; const coef={...card.coef}; delete coef[id]; return {...card, coef:(Object.keys(coef).length?coef:undefined)}; };
    return {...cb,
      requirements:(cb.requirements||[]).map(c=>dropCoef(strip(c,'Shift type'))).filter(c=>this._splitList(this._reqFieldVal(c,'Shift type')).length>0),
      counts:(cb.counts||[]).map(c=>dropCoef(strip(c,'Count shift types'))).filter(c=>this._splitList(this._reqFieldVal(c,'Count shift types')).length>0),
      affinities:(cb.affinities||[]).map(c=>strip(c,'Shift types')),
      coverings:(cb.coverings||[]).map(c=>strip(c,'Shift types')),
      successions:(cb.successions||[]).filter(c=>!this._patternTokens(this._reqFieldVal(c,'Pattern')).includes(id)),
    };
  }
  _renameShiftInCards(cb, oldId, newId){
    const ren=(card,key)=>{const arr=this._splitList(this._reqFieldVal(card,key)).map(x=>x===oldId?newId:x);return {...card, fields:card.fields.map(f=>f.k===key?{...f,v:arr.join(', ')}:f)};};
    const renCoef=(card)=>{ if(!card.coef||!(oldId in card.coef)) return card; const coef={}; Object.entries(card.coef).forEach(([k,v])=>{coef[k===oldId?newId:k]=v;}); return {...card, coef}; };
    const renPat=(card)=>{const re=new RegExp('(^|[^A-Za-z0-9_])'+oldId+'(?![A-Za-z0-9_])','g'); const nv=this._reqFieldVal(card,'Pattern').replace(re,(m,p1)=>p1+newId); return {...card, fields:card.fields.map(f=>f.k==='Pattern'?{...f,v:nv}:f)};};
    return {...cb,
      requirements:(cb.requirements||[]).map(c=>renCoef(ren(c,'Shift type'))),
      counts:(cb.counts||[]).map(c=>renCoef(ren(c,'Count shift types'))),
      affinities:(cb.affinities||[]).map(c=>ren(c,'Shift types')),
      coverings:(cb.coverings||[]).map(c=>ren(c,'Shift types')),
      successions:(cb.successions||[]).map(renPat),
    };
  }
  requestDeleteShift=(k)=>this.setState(s=>{
    const sh=s.shifts.find(x=>x._k===k); if(!sh||sh.auto) return {};
    return {confirmDelete:{kind:'shift', k, id:sh.id, label:sh.id, title:'Delete shift “'+sh.id+'”?', lines:this._shiftImpactLines(this._shiftRefs(s, sh.id))}};
  });
  cancelConfirm=()=>this.setState({confirmDelete:null});
  // ---- generic label cascade (people, groups, date-scopes referenced by name in card fields) ----
  PEOPLE_SPEC={requirements:['Qualified'], counts:['People'], successions:['People'], affinities:['People 1','People 2'], coverings:['Preceptors','Preceptees']};
  SHIFTGROUP_SPEC={requirements:['Shift type'], counts:['Count shift types'], affinities:['Shift types'], coverings:['Shift types']};
  DATE_SPEC={requirements:['Dates'], counts:['Dates'], successions:['Dates'], affinities:['Dates'], coverings:['Dates']};
  _mapLabelInCards(cb, spec, oldLabel, newLabel){ // newLabel===null → remove the token
    const out={...cb};
    Object.entries(spec).forEach(([kind,keys])=>{
      out[kind]=(cb[kind]||[]).map(card=>{
        let c=card;
        keys.forEach(key=>{

    return (shortcuts||[]).map(sc=>{
      const rec=this._findCardByUid(cb, sc.kind, sc.uid);
      const configured=!!rec;
      const on=configured && !rec.disabled;
      const flds=sc.fields||[];
      let cfg='Source constraint removed', params=[];
      if(configured){
        const parts=flds.map(fk=>fk+' '+this._fieldDisplay(rec,fk));
        cfg=parts.length?parts.join(' · '):(rec.desc||'Shortcut');
        params=flds.map(fk=>({key:'fld::'+fk, label:fk, type:(this._fieldNumeric(fk)?'number':'text'), value:this._fieldDisplay(rec,fk), unit:'', min:0, max:9999}));
      }
      return {id:sc._k, cat:sc.cat||'Custom shortcuts', title:(configured?(rec.desc||sc.title||'Shortcut'):(sc.title||'Shortcut')), desc:sc.desc||'', maps:this.KIND_LABEL[sc.kind]||'', linkLabel:this.KIND_LABEL[sc.kind]||'', source:'record', configured, on, locked:!configured, cfg, cfgTpl:null, params, advScreen:sc.kind, isUserShortcut:true, scKind:sc.kind, scUid:sc.uid, scFields:flds, toggleTitle:'Turns the underlying constraint on/off — also affects Advanced'};
    });
  }
  _setRecordDesc(cb, kind, uid, desc){ return {...cb,[kind]:(cb[kind]||[]).map(c=>c.uid===uid?{...c,desc:desc}:c)}; }
  shortcutAdd=(sc)=>{
    if((this.state.guidedShortcuts||[]).some(x=>x.uid===sc.uid)){ this.showToast('That constraint is already pinned to Rules.'); return; }
    this.setState(s=>{ const cardsByKind=(sc.title?this._setRecordDesc(s.cardsByKind, sc.kind, sc.uid, sc.title):s.cardsByKind); return {guidedShortcuts:[...s.guidedShortcuts, {...sc, _k:'gs'+(this._shortcutSeq++)}], cardsByKind}; });
  };
  shortcutUpdate=(k,sc)=>this.setState(s=>{ const cardsByKind=(sc.title?this._setRecordDesc(s.cardsByKind, sc.kind, sc.uid, sc.title):s.cardsByKind); return {guidedShortcuts:s.guidedShortcuts.map(x=>x._k===k?{...x,...sc}:x), cardsByKind}; });
  shortcutDelete=(k)=>this.setState(s=>({guidedShortcuts:s.guidedShortcuts.filter(x=>x._k!==k)}));
  CAT_ORDER=['Rest & recovery','Staffing levels','Skill mix','Fairness','Contracted hours','Preferences','Custom shortcuts'];
  CAT_ICONS={'Rest & recovery':'fa-bed','Staffing levels':'fa-users','Skill mix':'fa-user-graduate','Fairness':'fa-scale-balanced','Contracted hours':'fa-business-time','Preferences':'fa-heart','Custom shortcuts':'fa-thumbtack'};
  groupRules(rules){
    const order=this.CAT_ORDER;
    const icons=this.CAT_ICONS;
    const cats=[...order];
    rules.forEach(r=>{ if(r.cat && !cats.includes(r.cat)) cats.push(r.cat); });
    return cats.map(cat=>({cat, icon:icons[cat]||'fa-sliders', items:rules.filter(r=>r.cat===cat).map(r=>({...r, cfg:this.deriveCfg(r)}))})).filter(g=>g.items.length>0);
  }
  RULE_CATS = ['Rest & recovery','Staffing levels','Skill mix','Fairness','Contracted hours','Preferences'];
  countRequests(data){ let n=0; Object.values(data||{}).forEach(pr=>{ n+=Object.keys(pr).length; }); return n; }
}
</script>
