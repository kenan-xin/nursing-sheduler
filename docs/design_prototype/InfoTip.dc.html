<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="position:relative;display:inline-flex;align-items:center;vertical-align:middle;line-height:1;">
  <button onClick="{{ toggle }}" onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" aria-label="What does this mean?" style="{{ btnStyle }}">
    <i class="fa-solid fa-circle-info" style="font-size:12px;"></i>
  </button>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <span onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" style="{{ popStyle }}">
      <sc-if value="{{ hasTitle }}" hint-placeholder-val="{{ false }}"><span style="display:block;font:700 var(--m-xs) var(--font-mono);letter-spacing:.05em;text-transform:uppercase;color:var(--on-ink);opacity:.62;margin-bottom:4px;">{{ term }}</span></sc-if>
      {{ text }}
    </span>
  </sc-if>
</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:40,&quot;height&quot;:40},&quot;term&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;WORKDAY&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;text&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Working days — Mondays to Fridays, excluding public holidays.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state={ hover:false, pinned:false };
  renderVals(){
    const open=this.state.hover||this.state.pinned;
    const term=this.props.term||'';
    return {
      text:this.props.text||'',
      term, hasTitle:!!term,
      open,
      toggle:()=>this.setState(s=>({pinned:!s.pinned})),
      onEnter:()=>this.setState({hover:true}),
      onLeave:()=>this.setState({hover:false}),
      btnStyle:`display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;padding:0;border:none;background:transparent;cursor:pointer;color:${open?'var(--brandink)':'var(--ink3)'};`,
      popStyle:`position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);z-index:60;width:min(250px,62vw);background:var(--ink);color:var(--on-ink);font:500 13px var(--font-ui);line-height:1.45;padding:9px 11px;box-shadow:0 6px 22px rgba(8,10,14,.24);text-align:left;text-transform:none;letter-spacing:normal;white-space:normal;`,
    };
  }
}
</script>
</body>
</html>
