apiVersion: alpha
dates:
  range:
    startDate: 2025-01-01
    endDate: 2025-01-08
people:
  items:
    - id: j1
      description: Junior nurse 1
    - id: j2
      description: Junior nurse 2
    - id: s1
      description: Senior nurse 1
  groups:
    - id: Junior
      members: [j1, j2]
    - id: Senior
      members: [s1]
shiftTypes:
  items:
    - id: J
      description: Junior shift type
    - id: G
      description: General shift type
    - id: S
      description: Senior shift type
preferences:
  - type: at most one shift per day
  - type: shift type requirement
    description: Should be staffed by 1 junior nurse + 1 general nurse, or 1 senior nurse per day
    shiftType: [[J, G, S]]
    shiftTypeCoefficients:
      - [J, 2]
      - [G, 3]
      - [S, 5]
    requiredNumPeople: 5
  - type: shift count
    description: Junior nurses should not work any Senior shifts
    person: Junior
    countDates: ALL
    countShiftTypes: [S]
    expression: 'x = T'
    target: 0
    weight: .inf
  - type: shift count
    description: Senior nurses should not work any Junior shifts
    person: Senior
    countDates: ALL
    countShiftTypes: [J]
    expression: 'x = T'
    target: 0
    weight: .inf
  - type: shift count
    description: Balance scores for all nurses, where junior and general shifts count as 2, and senior shifts count as 3
    person: ALL
    countDates: ALL
    countShiftTypes: ALL
    countShiftTypeCoefficients:
      - [J, 2]
      - [G, 2]
      - [S, 3]
    expression: '|x - T|^2'
    target: 10
    weight: -1000
  - type: shift request
    person: Senior
    date: [1, 5]
    shiftType: S
    weight: 1
  - type: shift request
    person: Senior
    date: [3, 7]
    shiftType: G
    weight: 1
  - type: shift request
    person: j1
    date: ALL
    shiftType: J
    weight: 1
  - type: shift request
    person: j2
    date: 3
    shiftType: J
    weight: 1
